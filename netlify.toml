[build]
  command   = "pnpm turbo run build --filter web"
  publish   = "frontend/web/.next"

[build.environment]
  NODE_VERSION             = "20"
  NEXT_TELEMETRY_DISABLED  = "1"
  TURBO_TELEMETRY_DISABLED = "1"

# Enables SSR, ISR, API routes, and Image Optimization on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"
